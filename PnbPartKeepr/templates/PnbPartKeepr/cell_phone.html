{% load i18n %}

<td>
    {% if number %}
        <a href="tel:{{number}}">
            {% if icon %}
                <span class="fas fa-{{icon}}"></span>
            {% endif %}
            {{ number }}
        </a>
    {% else %}
        {% trans "No number" %}
    {% endif %}
</td>
