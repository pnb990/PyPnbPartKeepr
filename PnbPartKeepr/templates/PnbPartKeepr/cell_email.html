{% load i18n %}

<td>
    {% if elem.email %}
    <a href="mailto:{{ elem.email }}">
        <span class="fas fa-envelope"></span>
        {{ elem.email }}
    </a>
    {% else %}
        {% trans "No email" %}
    {% endif %}
</td>
